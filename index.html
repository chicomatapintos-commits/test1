<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shared File</title>

<style>
body {
    margin: 0;
    background: #f5f7fa;
    font-family: Arial, Helvetica, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.card {
    width: 380px;
    background: white;
    border-radius: 12px;
    padding: 30px;
    text-align: center;
    box-shadow: 0 8px 25px rgba(0,0,0,0.12);
}

.icon {
    font-size: 64px;
    margin-bottom: 15px;
}

h2 {
    margin: 10px 0;
    color: #333;
}

.info {
    color: #666;
    margin-bottom: 25px;
    font-size: 15px;
}

.download {
    display: inline-block;
    padding: 14px 30px;
    background: #1a73e8;
    color: white;
    text-decoration: none;
    border-radius: 8px;
    font-weight: bold;
    transition: 0.2s;
}

.download:hover {
    background: #1558b0;
}

.footer {
    margin-top: 25px;
    font-size: 13px;
    color: #888;
}
</style>

</head>
<body>

<div class="card">

    <div class="icon">📄</div>

    <h2>Invoice_2026.pdf</h2>

    <div class="info">
        PDF Document<br>
        Size: 2.8 MB
    </div>

    <a class="download" href="test1.txt">
        ⬇ Download File
    </a>

    <div class="footer">
        This file has been shared with you.
    </div>

</div>

</body>
</html>
