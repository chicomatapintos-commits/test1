<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cloud Drive</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#eef2f7;
    color:#333;
}

header{
    height:70px;
    background:#2563eb;
    color:white;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 30px;
    box-shadow:0 3px 8px rgba(0,0,0,.15);
}

header h1{
    font-size:24px;
}

header input{
    width:300px;
    padding:10px;
    border:none;
    border-radius:8px;
}

.container{
    display:flex;
    height:calc(100vh - 70px);
}

.sidebar{
    width:220px;
    background:white;
    padding:25px;
    border-right:1px solid #ddd;
}

.sidebar h3{
    margin-bottom:20px;
}

.menu{
    list-style:none;
}

.menu li{
    padding:12px;
    margin-bottom:8px;
    border-radius:8px;
    cursor:pointer;
}

.menu li:hover{
    background:#2563eb;
    color:white;
}

.main{
    flex:1;
    padding:30px;
}

.section-title{
    font-size:22px;
    margin-bottom:20px;
}

.storage{
    background:white;
    padding:20px;
    border-radius:12px;
    margin-bottom:30px;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.bar{
    margin-top:15px;
    width:100%;
    height:14px;
    background:#ddd;
    border-radius:20px;
}

.used{
    width:62%;
    height:100%;
    background:#2563eb;
    border-radius:20px;
}

.files{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
    gap:20px;
}

.card{
    background:white;
    border-radius:12px;
    padding:20px;
    text-align:center;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
    transition:.2s;
    cursor:pointer;
}

.card:hover{
    transform:translateY(-5px);
}

.icon{
    font-size:48px;
    margin-bottom:10px;
}

.name{
    font-weight:bold;
    margin-bottom:8px;
}

.size{
    color:#666;
    font-size:14px;
}
</style>

</head>
<body>

<header>
    <h1>☁ MyCloud Drive</h1>
    <input type="text" placeholder="Search files...">
</header>

<div class="container">

    <aside class="sidebar">
        <h3>Navigation</h3>

        <ul class="menu">
            <li>📁 My Files</li>
            <li>⭐ Favorites</li>
            <li>🕒 Recent</li>
            <li>📤 Shared</li>
            <li>🗑 Trash</li>
            <li>⚙ Settings</li>
        </ul>
    </aside>

    <main class="main">

        <div class="storage">
            <h2>Storage</h2>

            <div class="bar">
                <div class="used"></div>
            </div>

            <p style="margin-top:12px;">62 GB of 100 GB used</p>
        </div>

        <h2 class="section-title">My Files</h2>

        <div class="files">

            <div class="card">
                <div class="icon">📄</div>
                <div class="name">Report.pdf</div>
                <div class="size">2.4 MB</div>
            </div>

            <div class="card">
                <div class="icon">🖼️</div>
                <div class="name">Vacation.jpg</div>
                <div class="size">5.8 MB</div>
            </div>

            <div class="card">
                <div class="icon">🎬</div>
                <div class="name">Video.mp4</div>
                <div class="size">1.2 GB</div>
            </div>

            <div class="card">
                <div class="icon">📁</div>
                <div class="name">Projects</div>
                <div class="size">12 Files</div>
            </div>

            <div class="card">
                <div class="icon">🎵</div>
                <div class="name">Music.mp3</div>
                <div class="size">9.5 MB</div>
            </div>

            <div class="card">
                <div class="icon">📦</div>
                <div class="name">Backup.zip</div>
                <div class="size">850 MB</div>
            </div>

        </div>

    </main>

</div>

</body>
</html>
